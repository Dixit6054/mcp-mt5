; MT5 Strategy Tester sample config
; Launch: terminal64.exe /config:tester.ini
;
; ENUM_TIMEFRAMES codes: M1=1, M5=5, M15=15, M30=30, H1=16385, H4=16388, D1=16408
; Model: 0=Every tick, 1=1 min OHLC, 2=Open prices, 3=M1 OHLC, 4=Real ticks

[Tester]
Expert=MyEA
Symbol=EURUSD
Period=M15
Optimization=0
Model=1
FromDate=2024.01.01
ToDate=2024.12.31
ForwardMode=0
Deposit=10000
Currency=USD
Leverage=500
ExecutionMode=0
Visual=0
ShutdownTerminal=1
Report=tester_report

[TesterInputs]
; ParamName=value||start||step||stop||(N=fixed|Y=optimize)
; RiskPct=1.0||0.1||0.1||3.0||N
